<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weight Analytics</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container py-4">
      <!-- Header -->
      <div class="d-flex align-items-center mb-4">
        <a href="index.html" class="btn btn-link ps-0 me-3">← Back</a>
        <h1 class="form-title mb-0">Analytics</h1>
      </div>

      <!-- ===========================
         SECTION 1: TREND LINE CHART
    =========================== -->
      <div class="analytics-card mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="section-title">📈 Weight Trend</h2>
        </div>

        <!-- Day Range Selector -->
        <div class="day-selector mb-4">
          <button class="day-btn active" onclick="setRange(7, this)">7D</button>
          <button class="day-btn" onclick="setRange(30, this)">30D</button>
          <button class="day-btn" onclick="setRange(90, this)">90D</button>
          <button class="day-btn" onclick="setRange(180, this)">180D</button>
          <button class="day-btn" onclick="setRange(365, this)">1Y</button>
        </div>

        <!-- Chart -->
        <div class="chart-wrapper">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <!-- ===========================
         SECTION 2: AVERAGES TABLE
    =========================== -->
      <div class="analytics-card mb-4">
        <h2 class="section-title mb-3">📊 Average Weight</h2>

        <div class="avg-grid">
          <div class="avg-card">
            <div class="avg-label">Last 7 Days</div>
            <div class="avg-value" id="avg-7">--</div>
            <div class="avg-unit">kg</div>
          </div>
          <div class="avg-card">
            <div class="avg-label">Last 15 Days</div>
            <div class="avg-value" id="avg-15">--</div>
            <div class="avg-unit">kg</div>
          </div>
          <div class="avg-card">
            <div class="avg-label">Last 30 Days</div>
            <div class="avg-value" id="avg-30">--</div>
            <div class="avg-unit">kg</div>
          </div>
          <div class="avg-card">
            <div class="avg-label">Last 90 Days</div>
            <div class="avg-value" id="avg-90">--</div>
            <div class="avg-unit">kg</div>
          </div>
        </div>
      </div>

      <!-- ===========================
         SECTION 3: TABULAR DATA
    =========================== -->
      <div class="analytics-card mb-4">
        <h2 class="section-title mb-3">🗃️ Recent Entries</h2>
        <div class="table-wrapper">
          <table class="table table-dark table-hover">
            <thead>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Weight (kg)</th>
                <th>Rank</th>
              </tr>
            </thead>
            <tbody id="data-table-body">
              <tr>
                <td colspan="4" class="text-center text-muted">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Analytics Script -->
    <script src="analytics.js"></script>
  </body>
</html>
