<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<meta name="theme-color" content="#D1C4E9">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weight Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container d-flex flex-column align-items-center justify-content-center min-vh-100 text-center" id="home-screen">
        <h1 class="app-title mb-2">Weight Tracker</h1>
        <p class="app-subtitle mb-5">Track your weight. See your progress.</p>
        <button class="btn btn-primary btn-lg w-100 mb-3" id="log-btn">🏋️ Let's Log Weight</button>
        <a href="analytics.html" class="btn btn-outline-secondary btn-lg w-100">📊 View Analytics</a>
    </div>

    <div class="container d-flex flex-column min-vh-100 py-4" id="form-screen" style="display: none">
        <button class="btn btn-link ps-0 mb-3" id="back-btn">← Back</button>
        <h2 class="form-title mb-4">Log Your Weight</h2>

        <div class="mb-4">
            <label for="input-date" class="form-label fw-semibold">📅 Date</label>
            <input type="date" class="form-control form-control-lg" id="input-date" />
        </div>

        <div class="mb-4">
            <label for="input-time" class="form-label fw-semibold">🕐 Time of Day</label>
            <select class="form-select form-select-lg" id="input-time">
                <option value="" disabled selected>Select time of day</option>
                <option value="Morning">Morning</option>
                <option value="Afternoon">Afternoon</option>
                <option value="Evening">Evening</option>
                <option value="Night">Night</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">⚖️ Weight (kg)</label>
            <div class="weight-display-container text-center">
                <span id="weight-value">70.0</span><span class="unit">kg</span>
            </div>
            
            <div class="ruler-wrapper" id="ruler-wrapper">
                <div class="ruler-pointer"></div>
                <div class="ruler-container" id="ruler">
                    </div>
            </div>
        </div>

        <div class="mt-auto">
            <div id="loading-dots" class="dots-container" style="display: none">
                <span></span><span></span><span></span>
            </div>
            <button class="btn btn-primary btn-lg w-100" id="submit-btn">✅ Submit Entry</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    <div id="loading-overlay" style="display: none">
        <div class="overlay-content">
            <div class="spinner"></div>
            <p class="overlay-text" id="overlay-text"></p>
        </div>
    </div>
</body>
</html>
